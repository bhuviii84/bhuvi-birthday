<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Birthday</title>\n    <style>\n        .candle {\n            width: 50px;\n            height: 100px;\n            background-color: #cccccc;\n            display: inline-block;\n            margin: 5px;\n            position: relative;\n            cursor: pointer;\n        }\n        .flame {\n            width: 20px;\n            height: 20px;\n            background-color: yellow;\n            position: absolute;\n            top: -10px;\n            left: 15px;\n            display: none;\n        }\n    </style>\n</head>\n<body>\n    <h1>Welcome to the Birthday Celebration!</h1>\n    <h2>Light the Candles!</h2>\n    <div id="candles">\n        <div class="candle" onclick="lightUp(0)">\n            <div class="flame" id="flame0"></div>\n        </div>\n        <div class="candle" onclick="lightUp(1)">\n            <div class="flame" id="flame1"></div>\n        </div>\n        <div class="candle" onclick="lightUp(2)">\n            <div class="flame" id="flame2"></div>\n        </div>\n        <div class="candle" onclick="lightUp(3)">\n            <div class="flame" id="flame3"></div>\n        </div>\n        <div class="candle" onclick="lightUp(4)">\n            <div class="flame" id="flame4"></div>\n        </div>\n    </div>\n    <script>\n        const letters = ['B', 'H', 'U', 'V', 'I'];\n        function lightUp(index) {\n            const flame = document.getElementById(`flame${index}`);\n            flame.style.display = 'block';\n            alert('You revealed letter: ' + letters[index]);\n        }\n    </script>\n</body>\n</html>\n
