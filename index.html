<!DOCTYPE html>

<meta charset="UTF-8">

<title>Floral Frame</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .frame-wrapper {
    width: 100%;
    max-width: 480px;
    position: relative;
  }
  .floral-card {
    width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 30% 30%, #fffff0 0%, #f5f0c0 20%, #d4e8a0 55%, #a8c870 100%);
  }
  .bokeh {
    position: absolute;
    border-radius: 50%;
    filter: blur(18px);
    opacity: 0.55;
  }
  .bokeh-1 { width: 90px; height: 90px; background: #fff9d0; top: 8%; left: 18%; }
  .bokeh-2 { width: 60px; height: 60px; background: #fff7b0; top: 18%; left: 28%; }
  .bokeh-3 { width: 45px; height: 45px; background: #fffce8; top: 28%; left: 40%; }
  .bokeh-4 { width: 30px; height: 30px; background: #fff5a0; top: 50%; left: 55%; }
  .bokeh-5 { width: 55px; height: 55px; background: #fffff5; top: 15%; left: 10%; }
  .center-glow {
    position: absolute;
    width: 55%;
    height: 70%;
    top: 10%;
    left: 22%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.92) 0%, rgba(255,255,220,0.6) 45%, transparent 80%);
    border-radius: 50%;
  }
  .floral-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .sparkle { position: absolute; border-radius: 50%; background: #e87040; }
  .sp1 { width: 5px; height: 5px; top: 72%; left: 52%; }
  .sp2 { width: 4px; height: 4px; top: 68%; left: 60%; }
  .sp3 { width: 6px; height: 6px; top: 75%; left: 65%; }
  .sp4 { width: 4px; height: 4px; top: 60%; left: 70%; }
  .sp5 { width: 5px; height: 5px; top: 65%; left: 58%; }
  .small-flower { position: absolute; font-size: clamp(8px, 2vw, 13px); z-index: 15; }
  .sf1 { top: 4%; right: 22%; }
  .sf2 { top: 2%; right: 16%; }
  .sf3 { top: 7%; right: 26%; }
</style>
</head>
